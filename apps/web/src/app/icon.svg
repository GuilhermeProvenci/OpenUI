<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <!-- Rich deep background gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="50%" stop-color="#312e81"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>

    <!-- Vibrant bracket gradient: indigo → violet → amber -->
    <linearGradient id="bracketL" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a5b4fc"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <linearGradient id="bracketR" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#fb923c"/>
    </linearGradient>

    <!-- Glow filter for brackets -->
    <filter id="glowBlue" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowAmber" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Subtle inner shadow for depth -->
    <filter id="innerShadow">
      <feOffset dx="0" dy="4"/>
      <feGaussianBlur stdDeviation="6" result="shadow"/>
      <feComposite in="SourceGraphic" in2="shadow" operator="over"/>
    </filter>

    <!-- Soft radial highlight in center -->
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#1e1b4b" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Subtle noise/texture layer via tiny dots pattern -->
  <rect width="512" height="512" rx="112" fill="url(#centerGlow)"/>

  <!-- Decorative thin ring inside the square -->
  <rect x="14" y="14" width="484" height="484" rx="100"
        fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1.5"/>

  <!-- Corner accent dots -->
  <circle cx="90" cy="90" r="4" fill="rgba(165,180,252,0.3)"/>
  <circle cx="422" cy="90" r="4" fill="rgba(251,146,60,0.3)"/>
  <circle cx="90" cy="422" r="4" fill="rgba(165,180,252,0.15)"/>
  <circle cx="422" cy="422" r="4" fill="rgba(251,146,60,0.15)"/>

  <!-- Bracket left < — blue/indigo glow -->
  <path d="M196 152 L100 256 L200 360"
        stroke="url(#bracketL)" stroke-width="44"
        stroke-linecap="round" stroke-linejoin="round"
        fill="none"
        filter="url(#glowBlue)"/>

  <!-- Slash / — bright white with amber tint -->
  <line x1="308" y1="144" x2="204" y2="368"
        stroke="rgba(255,255,255,0.55)" stroke-width="30"
        stroke-linecap="round"/>

  <!-- Slash subtle glow duplicate -->
  <line x1="308" y1="144" x2="204" y2="368"
        stroke="rgba(251,191,36,0.15)" stroke-width="52"
        stroke-linecap="round"/>

  <!-- Bracket right > — amber/orange glow -->
  <path d="M311 152 L412 256 L311 360"
        stroke="url(#bracketR)" stroke-width="44"
        stroke-linecap="round" stroke-linejoin="round"
        fill="none"
        filter="url(#glowAmber)"/>


</svg>